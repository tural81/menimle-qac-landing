document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

l\" data-delay=\"1\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <div class=\"test-quote\"><span data-lang=\"az\">\"Təkbaşına qaçmağı buraxdım. İndi hər səhər 4 nəfər Bulvarda gözləyir. Tempim 30 saniyə yaxşılaşdı.\"<\u002Fspan><span data-lang=\"en\">\"I stopped running alone. Now 4 people wait for me at Bulvar every morning. My pace got 30 seconds better.\"<\u002Fspan><\u002Fdiv>\n        <div class=\"test-who\">\n          <div class=\"test-ava\" style=\"background: linear-gradient(135deg,#EF476F,#FFD166); box-shadow: inset 0 -8px 16px rgba(0,0,0,0.15);\">A<\u002Fdiv>\n          <div>\n            <div class=\"test-name\">Aysel Məmmədova<\u002Fdiv>\n            <div class=\"test-role\"><span data-lang=\"az\">Bakı · 6 ay istifadəçi<\u002Fspan><span data-lang=\"en\">Baku · 6 months<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"test reveal\" data-delay=\"2\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <div class=\"test-quote\"><span data-lang=\"az\">\"Klub hissəsi fenomenaldır. İlk dəfə marafona qoşulanda 200 nəfərlik bir komandada olacağımı ağlıma belə gətirməzdim.\"<\u002Fspan><span data-lang=\"en\">\"The clubs feature is phenomenal. Joining my first marathon with a 200-person team was unforgettable.\"<\u002Fspan><\u002Fdiv>\n        <div class=\"test-who\">\n          <div class=\"test-ava\" style=\"background: linear-gradient(135deg,#266DFF,#7AA7FF); box-shadow: inset 0 -8px 16px rgba(0,0,0,0.15);\">R<\u002Fdiv>\n          <div>\n            <div class=\"test-name\">Ruslan Hüseynov<\u002Fdiv>\n            <div class=\"test-role\"><span data-lang=\"az\">Sumqayıt · 1 il istifadəçi<\u002Fspan><span data-lang=\"en\">Sumqayit · 1 year<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"test reveal\" data-delay=\"3\">\n        <div class=\"stars\">★★★★★<\u002Fdiv>\n        <div class=\"test-quote\"><span data-lang=\"az\">\"Apple Watch-la əla işləyir. Canlı nəbz, streak, marşrut — bir appdə hər şey. Strava-dan keçdim.\"<\u002Fspan><span data-lang=\"en\">\"Works great with Apple Watch. Live heart rate, streak, routes — it's all here. I switched from Strava.\"<\u002Fspan><\u002Fdiv>\n        <div class=\"test-who\">\n          <div class=\"test-ava\" style=\"background: linear-gradient(135deg,#06A77D,#B5FF25); box-shadow: inset 0 -8px 16px rgba(0,0,0,0.15);\">L<\u002Fdiv>\n          <div>\n            <div class=\"test-name\">Leyla Abbasova<\u002Fdiv>\n            <div class=\"test-role\"><span data-lang=\"az\">Bakı · 3 ay istifadəçi<\u002Fspan><span data-lang=\"en\">Baku · 3 months<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"block how\" id=\"faq\">\n  <div class=\"container\">\n    <div style=\"text-align: center;\">\n      <div class=\"eyebrow reveal\">FAQ<\u002Fdiv>\n      <h2 class=\"reveal\" data-delay=\"1\"><span data-lang=\"az\">Tez-tez verilən<br>suallar.<\u002Fspan><span data-lang=\"en\">Frequently asked<br>questions.<\u002Fspan><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq reveal\" data-delay=\"2\">\n      <details class=\"q\" open=\"\">\n        <summary><span data-lang=\"az\">App pulsuzdur?<\u002Fspan><span data-lang=\"en\">Is the app free?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">Bəli. Əsas funksiyalar — qaçış, statistika, klublar, dostlar — tamamilə pulsuzdur. Pro planda əlavə analitika və fərdi məşqçi AI-ı var.<\u002Fspan><span data-lang=\"en\">Yes. Core features — tracking, stats, clubs, buddies — are fully free. Pro adds advanced analytics and a personal AI coach.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"q\">\n        <summary><span data-lang=\"az\">Hansı cihazlarla uyğundur?<\u002Fspan><span data-lang=\"en\">What devices are supported?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">iPhone (iOS 15+) və Android (11+). Apple Watch və Wear OS dəstəklənir — nəbz, temp və addım saatdan real vaxtda gəlir.<\u002Fspan><span data-lang=\"en\">iPhone (iOS 15+) and Android (11+). Apple Watch and Wear OS are supported — heart rate, pace and steps stream live.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"q\">\n        <summary><span data-lang=\"az\">Yalnız Bakıda işləyir?<\u002Fspan><span data-lang=\"en\">Does it only work in Baku?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">Xeyr — dünya üzrə işləyir. Amma ən aktiv icmamız Bakı, Sumqayıt və Gəncədədir. Hansı şəhərdə olursansa, yaxınlıqdakı qaçışçıları tapacaqsan.<\u002Fspan><span data-lang=\"en\">No — it works worldwide. Our most active communities are in Baku, Sumqayit and Ganja, but you'll find runners near you anywhere.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"q\">\n        <summary><span data-lang=\"az\">Şəxsi yerim paylaşılır?<\u002Fspan><span data-lang=\"en\">Is my location shared?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">Heç vaxt dəqiq ünvanın göstərilmir — yalnız təxmini məsafə (məs. \"1.2 km yaxınlıqda\"). Məxfilik tənzimləmələrində kimə görünəcəyini tam idarə edirsən.<\u002Fspan><span data-lang=\"en\">Your exact address is never shown — only an approximate distance (e.g. \"1.2 km away\"). You control who sees what in privacy settings.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"q\">\n        <summary><span data-lang=\"az\">Təzə başlayanam, uyğundur?<\u002Fspan><span data-lang=\"en\">I'm a beginner, is it for me?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">Əla seçimdir. Tempini seçərkən \"yeni başlayan\"ı işarələ — səninlə eyni səviyyədəki insanları və mentor-qaçışçıları tövsiyə edəcəyik.<\u002Fspan><span data-lang=\"en\">Absolutely. Mark \"beginner\" when you set your pace and we'll suggest runners at your level plus mentor-runners.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"q\">\n        <summary><span data-lang=\"az\">Strava və Apple Health ilə sinxronlaşır?<\u002Fspan><span data-lang=\"en\">Does it sync with Strava and Apple Health?<\u002Fspan><\u002Fsummary>\n        <div class=\"q-body\"><span data-lang=\"az\">Bəli, hər ikisi ilə. Parametrlər → İnteqrasiyalar bölməsindən bir kliklə qoşa bilərsən.<\u002Fspan><span data-lang=\"en\">Yes, both. Connect in Settings → Integrations with a single tap.<\u002Fspan><\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta-final\" id=\"download\">\n  <div class=\"container\">\n    <div class=\"eyebrow reveal\"><span data-lang=\"az\">Yüklə<\u002Fspan><span data-lang=\"en\">Download<\u002Fspan><\u002Fdiv>\n    <h2 class=\"reveal\" data-delay=\"1\"><span data-lang=\"az\">Növbəti qaçışın<br>tək olmayacaq.<\u002Fspan><span data-lang=\"en\">Your next run<br>won't be alone.<\u002Fspan><\u002Fh2>\n    <p class=\"reveal\" data-delay=\"2\"><span data-lang=\"az\">Pulsuz yüklə. 2 dəqiqədə qur. Sabah səhər kimsə səninlə qaçacaq.<\u002Fspan><span data-lang=\"en\">Free to download. Set up in 2 minutes. Someone runs with you tomorrow.<\u002Fspan><\u002Fp>\n    <div class=\"cta-ctas reveal\" data-delay=\"3\">\n      <a href=\"#\" class=\"store\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 384 512\" fill=\"currentColor\"><path d=\"M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z\"><\u002Fpath><\u002Fsvg>\n        <div><div class=\
